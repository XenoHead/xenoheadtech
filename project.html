<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XenoHead — Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>

@font-face {
    font-family: 'Elektora';
    src: url('assets/Elektora-qm0.ttf') format('truetype');
}
.logo h2 {
    font-family: 'Elektora', sans-serif !important;
    font-size: 2.2rem !important;
    text-transform: none !important;
    letter-spacing: 1px !important;
}


@font-face {
    font-family: 'MSDOS';
    src: url('PcSeniorRegular-OEnd.ttf') format('truetype');
}
h1, h2, h3, .header h1, .hero h1 {
    font-family: 'MSDOS', monospace !important;
    font-size: clamp(1.5rem, 3vw, 2.5rem) !important;
    font-weight: normal !important;
    line-height: 1.2 !important;
    text-transform: uppercase;
}

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { background:#050816; color:#EAF7FF; font-family:'Space Grotesk',sans-serif; overflow-x:hidden; }
        :root { --bg:#050816; --surface:#0B1020; --surface2:#12192B; --accent:#00CFFF; --accentSoft:#5CE1FF; --text:#EAF7FF; --muted:#7D8CA3; }
        .background-image { position:fixed; inset:0; background-image: linear-gradient(rgba(5,8,22,0.85), rgba(5,8,22,0.95)), url('assets/projects-bg.webp'); background-size:cover; background-position:center; background-repeat:no-repeat; z-index:-2; animation:slowZoom 28s ease-in-out infinite alternate; }
        @keyframes slowZoom { from { transform:scale(1.02); } to { transform:scale(1.09); } }
        body::before { content:""; position:fixed; inset:0; background: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size:70px 70px; z-index:-1; }
        
        nav { width:100%; position:fixed; top:0; z-index:999; backdrop-filter:blur(16px); background:rgba(5,8,22,0.72); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-inner { max-width:1300px; margin:auto; padding:1.4rem 2rem 1.4rem 80px; display:flex; justify-content:space-between; align-items:center; }
        .logo { display:flex; align-items:center; gap:1rem; text-decoration:none; color:white; }
        .logo img { width:42px; }
        .logo span { color:var(--accent); }
        .nav-links { display:flex; gap:2rem; }
        .nav-links a { text-decoration:none; color:var(--muted); transition:0.3s; }
        .nav-links a:hover { color:var(--accent); }

        .container { max-width:900px; margin:auto; padding:9rem 2rem 6rem 80px; }
        
        #project-container { display: none; animation: fadeUp 1s ease forwards; }
        
        .project-hero { width: 100%; height: 400px; background-size: cover; background-position: center; border: 1px solid rgba(0,207,255,0.2); margin-bottom: 3rem; box-shadow: 0 0 40px rgba(0,207,255,0.1); position: relative; }
        .project-hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, #050816, transparent); }

        .system { color:var(--accent); font-family:'IBM Plex Mono', monospace; letter-spacing:2px; font-size:0.85rem; margin-bottom:1rem; }
        h1 { font-size:clamp(2.5rem,5vw,4rem); line-height:1; margin-bottom:1.5rem; }
        
        .tags { display:flex; gap:0.8rem; margin-bottom: 3rem; flex-wrap: wrap;}
        .tags span { border: 1px solid rgba(0,207,255,0.15); padding: 0.35rem 0.6rem; color:var(--accentSoft); font-size:0.75rem; font-family:'IBM Plex Mono', monospace; }

        .description { color:var(--muted); line-height:2; font-size:1.15rem; margin-bottom: 4rem; }
        
        .project-links { display: flex; align-items: center; justify-content: flex-start; gap: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);}
        
        footer { margin-top:6rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top:2rem; color:var(--muted); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0px); } }
        .fade-out { animation:fadeOut 0.45s ease forwards; }
        @keyframes fadeOut { to { opacity:0; filter:blur(8px); transform:scale(1.02); } }

        @media(max-width:800px) {
            .nav-links { display:none; }
            .project-hero { height: 250px; }
        }
    
/* CYBER SIDEBAR */
.cyber-sidebar { position: fixed; left: 20px; top: 50%; transform: translateY(-50%); height: 85vh; width: 30px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; z-index: 10; pointer-events: none; --accent: #ffff00; }
.cyber-line { flex-grow: 1; background: var(--accent); width: 1px; box-shadow: 0 0 10px var(--accent); opacity: 0.6; position: relative; margin: 10px 0; }
.cyber-text { writing-mode: vertical-rl; transform: rotate(180deg); color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 4px; margin: 2rem 0; opacity: 0.9; text-shadow: 0 0 5px var(--accent); }
.cyber-blocks { display: flex; flex-direction: column; gap: 8px; align-items: center; width: 100%; }
.cyber-blocks span { display: block; width: 12px; height: 12px; border: 1px solid var(--accent); opacity: 0.6; box-shadow: inset 0 0 5px var(--accent); }
.cyber-blocks span.active { background: var(--accent); opacity: 1; box-shadow: 0 0 10px var(--accent); }
@media(max-width:800px) { .cyber-sidebar { display: none; } }

</style>
</head>
<body>

<div class="background-image"></div>

<div class="cyber-sidebar">
    <div class="cyber-blocks"><span class="active"></span><span></span></div>
    <div class="cyber-line"></div>
    <div class="cyber-text">MODULE_VIEW // DETAIL</div>
    <div class="cyber-line"></div>
    <div class="cyber-blocks"><span class="active"></span><span></span></div>
</div>


<nav>
    <div class="nav-inner">
        <a href="index.html" class="logo page-link">
            <img src="logo.png" alt="XenoHead">
            <h2>Xeno<span>Head</span></h2>
        </a>
        <div class="nav-links">
            <a href="projects.html" class="page-link">Projects</a>
            <a href="writing.html" class="page-link">Writing</a>
            <a href="books.html" class="page-link">Books</a>
            <a href="contact.html" class="page-link">Contact</a>
        </div>
    </div>
</nav>

<div class="container">
    <div id="loading" style="color: var(--accent); font-family: 'IBM Plex Mono'; text-align: center; margin-top: 5rem;">Loading System Data...</div>
    
    <div id="project-container">
        <!-- Injected via JS -->
    </div>

    <footer>
        <p>XenoHead — Active connection.</p>
    </footer>
</div>

<script>
async function loadProject() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        
        if (!projectId) {
            document.getElementById('loading').innerText = "ERROR: No project ID specified.";
            return;
        }

        const response = await fetch('data/projects.json?t=' + Date.now());
        const projects = await response.json();
        
        const project = projects.find(p => p.id === projectId);
        
        if (!project) {
            document.getElementById('loading').innerText = "ERROR: Project not found in archive.";
            return;
        }

        document.getElementById('loading').style.display = 'none';
        
        const container = document.getElementById('project-container');
        document.title = `XenoHead — ${project.title}`;
        
        container.innerHTML = `
            <div class="project-hero" style="background-image:url('${project.image}')"></div>
            
            <div class="system">// ${project.category}</div>
            <h1>${project.title}</h1>
            
            <div class="tags">
                ${project.tags.map(t => `<span>${t}</span>`).join('')}
            </div>

            <div class="description">
                ${project.description ? project.description.replace(/\n/g, '<br>') : ''}
            </div>

            <div class="project-links">
                <a href="${project.viewLink}" target="_blank">
                    <img src="https://get.microsoft.com/images/en-us%20dark.svg" alt="Get it from Microsoft" style="height: 44px; display: block;">
                </a>
            </div>
        `;
        
        container.style.display = 'block';

    } catch (e) {
        console.error(e);
        document.getElementById('loading').innerText = "ERROR: Data corruption detected.";
    }
}

const pageLinks = document.querySelectorAll('.page-link');
pageLinks.forEach(link => {
    link.addEventListener('click', e => {
        e.preventDefault();
        document.body.classList.add('fade-out');
        const target = link.getAttribute('href');
        setTimeout(() => { window.location.href = target; }, 400);
    });
});

document.addEventListener('DOMContentLoaded', loadProject);
</script>

</body>
</html>
