XENOHEAD — WRITING PAGE
writing.html

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>XenoHead — Writing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="global.css">

    <style>
        /* =========================================
BACKGROUND
========================================= */

        .background-image {
            position: fixed;
            inset: 0;

            background-image:
                linear-gradient(rgba(5, 8, 22, 0.88), rgba(5, 8, 22, 0.97)),
                url('assets/writing-bg.webp');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            z-index: -2;

            animation: slowZoom 28s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {

            from {
                transform: scale(1.02);
            }

            to {
                transform: scale(1.09);
            }

        }

        body::before {
            content: "";

            position: fixed;
            inset: 0;

            background:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);

            background-size: 70px 70px;

            z-index: -1;
        }

        /* =========================================
LAYOUT
========================================= */

        .container {

            max-width: 1200px;

            margin: auto;

            padding: 9rem 2rem 6rem 80px;
        }

        /* =========================================
HEADER
========================================= */

        .header {

            margin-bottom: 5rem;

            animation: fadeUp 1s ease forwards;
        }

        .system {

            color: var(--accent);

            font-family: 'IBM Plex Mono', monospace;

            letter-spacing: 2px;

            font-size: 0.85rem;

            margin-bottom: 1rem;
        }

        .header h1 {
            line-height: 0.95;

            margin-bottom: 1.5rem;
        }

        .header p {

            max-width: 700px;

            color: var(--muted);

            line-height: 1.9;

            font-size: 1.1rem;
        }

        /* =========================================
WRITING LIST
========================================= */

        .writing-list {

            display: flex;

            flex-direction: column;

            gap: 2rem;
        }

        /* =========================================
ENTRY
========================================= */

        .entry {

            position: relative;

            background:
                rgba(11, 16, 32, 0.74);

            border:
                1px solid rgba(255, 255, 255, 0.05);

            padding: 2.5rem;

            transition: 0.4s ease;

            overflow: hidden;

            backdrop-filter: blur(12px);
        }

        .entry:hover {

            border-color:
                rgba(0, 207, 255, 0.24);

            transform:
                translateX(10px);

            box-shadow:
                0 0 35px rgba(0, 207, 255, 0.08);
        }

        .entry::before {

            content: "";

            position: absolute;

            left: 0;
            top: 0;

            width: 2px;
            height: 100%;

            background:
                linear-gradient(transparent,
                    rgba(0, 207, 255, 0.7),
                    transparent);

        }

        /* =========================================
ENTRY CONTENT
========================================= */

        .entry small {

            color: var(--accent);

            font-family: 'IBM Plex Mono', monospace;

            letter-spacing: 2px;
        }

        .entry h2 {

            margin: 1rem 0;

            line-height: 1.2;
        }

        .entry p {

            color: var(--muted);

            line-height: 1.9;

            max-width: 850px;
        }

        /* =========================================
META
========================================= */

        .meta {

            margin-top: 2rem;

            display: flex;

            gap: 1rem;

            flex-wrap: wrap;
        }

        .meta span {

            border:
                1px solid rgba(0, 207, 255, 0.18);

            padding:
                0.45rem 0.7rem;

            color: var(--accent);

            font-size: 0.75rem;

            font-family: 'IBM Plex Mono', monospace;
        }

        /* =========================================
BUTTON
========================================= */

        .read-button {

            margin-top: 2rem;

            display: inline-block;

            text-decoration: none;

            color: white;

            border:
                1px solid rgba(0, 207, 255, 0.22);

            padding:
                0.9rem 1.4rem;

            transition: 0.3s ease;
        }

        .read-button:hover {

            background:
                rgba(0, 207, 255, 0.08);

            border-color:
                rgba(0, 207, 255, 0.45);

            box-shadow:
                0 0 25px rgba(0, 207, 255, 0.12);
        }

        /* =========================================
ANIMATION
========================================= */

        .reveal {

            opacity: 0;

            transform: translateY(40px);

            transition: 1s ease;
        }

        .reveal.active {

            opacity: 1;

            transform: translateY(0px);
        }

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0px);
            }

        }

        /* =========================================
MOBILE
========================================= */

        @media(max-width:800px) {

            .entry {
                padding: 2rem;
            }

        }


        /* CYBER SIDEBAR */
        .cyber-sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            height: 85vh;
            width: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
            --accent: #ffa500;
        }

        .cyber-line {
            flex-grow: 1;
            border-left: 3px solid var(--accent);
            border-right: 1px solid var(--accent);
            width: 6px;
            opacity: 0.6;
            position: relative;
            margin: 10px 0;
        }

        .cyber-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 4px;
            margin: 2rem 0;
            opacity: 0.9;
            text-shadow: 0 0 5px var(--accent);
        }

        .cyber-blocks {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: 100%;
        }

        .cyber-blocks span {
            display: block;
            width: 12px;
            height: 12px;
            border: 1px solid var(--accent);
            opacity: 0.6;
            box-shadow: inset 0 0 5px var(--accent);
        }

        .cyber-blocks span.active {
            background: var(--accent);
            opacity: 1;
            box-shadow: 0 0 10px var(--accent);
        }

        @media(max-width:800px) {
            .cyber-sidebar {
                display: none;
            }
        }
    </style>

</head>

<body>

    <div class="background-image"></div>

    <div class="cyber-sidebar">
        <div class="cyber-blocks"><span style="border-radius:50%"></span><span style="border-radius:50%"
                class="active"></span></div>
        <div class="cyber-line"></div>
        <div class="cyber-text">ARCHIVE.TXT // READ_MODE</div>
        <div class="cyber-line"></div>
        <div class="cyber-blocks"><span style="border-radius:50%"></span><span style="border-radius:50%"
                class="active"></span></div>
    </div>


    <!-- =========================================
NAVIGATION
========================================= -->

    <nav>

        ```
        <div class="nav-inner">

            <a href="index.html" class="logo page-link">

                <img src="logo.png" alt="XenoHead">

                <h2>Xeno<span>Head</span></h2>

            </a>

            <div class="nav-links">

                <a href="projects.html">Projects</a>

                <a href="writing.html">Writing</a>

                <a href="books.html">Books</a>

                <a href="contact.html">Contact</a>

            </div>

        </div>
        ```

    </nav>

    <!-- =========================================
MAIN
========================================= -->

    <div class="container">

        ```
        <!-- HEADER -->

        <div class="header">

            <div class="system">
                // ARCHIVE ONLINE
            </div>

            <h1>
                Essays,
                Signals &
                Speculation
            </h1>

            <p>
                Writing on intelligence,
                systems,
                software,
                cognition,
                philosophy,
                and the strange futures
                approaching the horizon.
            </p>

        </div>

        <!-- WRITING LIST -->

        <div class="writing-list">
            <!-- Writing entries will be loaded dynamically from data/writing.json -->
        </div>

        <!-- FOOTER -->

        <footer>

            <p>
                XenoHead —
                Signal archive active.
            </p>

        </footer>
        ```

    </div>

    <script>

        async function loadWriting() {
            try {
                const response = await fetch('data/writing.json?t=' + Date.now());
                const writing = await response.json();
                const list = document.querySelector('.writing-list');
                list.innerHTML = writing.map(w => `
            <article class="entry reveal">
                <small>// ${w.signal}</small>
                <h2>${w.title}</h2>
                <p>${w.description ? w.description.replace(/\n/g, '<br>') : ''}</p>
                <div class="meta">
                    ${w.tags.map(t => `<span>${t}</span>`).join('')}
                </div>
                <a href="${w.link}" class="read-button">Read Transmission</a>
            </article>
        `).join('');

                initializeEffects();
            } catch (e) {
                console.error("Failed to load writing entries:", e);
            }
        }

        function initializeEffects() {
            /* =========================================
            SCROLL REVEALS
            ========================================= */
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.15 });

            reveals.forEach(reveal => {
                observer.observe(reveal);
            });

            /* =========================================
            ENTRY LIGHT TRACKING
            ========================================= */
            const entriesList = document.querySelectorAll('.entry');
            entriesList.forEach(entry => {
                entry.addEventListener('mousemove', e => {
                    const rect = entry.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    entry.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(0,207,255,0.08), rgba(11,16,32,0.76) 45%)`;
                });
                entry.addEventListener('mouseleave', () => {
                    entry.style.background = `rgba(11,16,32,0.74)`;
                });
            });
        }

        /* =========================================
        PAGE TRANSITIONS
        ========================================= */
        const pageLinks = document.querySelectorAll('.page-link');
        pageLinks.forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                document.body.classList.add('fade-out');
                const target = link.getAttribute('href');
                setTimeout(() => {
                    window.location.href = target;
                }, 400);
            });
        });

        document.addEventListener('DOMContentLoaded', loadWriting);

    </script>

</body>

</html>
