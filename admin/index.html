<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XenoHead — System Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#050816; color:#EAF7FF; font-family:'Space Grotesk',sans-serif; padding: 2rem; }
        h1 { font-size: 2rem; margin-bottom: 2rem; color: #00CFFF; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase;}
        
        .nav-back { display: inline-block; margin-bottom: 2rem; color: #7D8CA3; text-decoration: none; font-family: 'IBM Plex Mono'; font-size: 0.9rem;}
        .nav-back:hover { color: white; }

        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab { padding: 0.8rem 1.5rem; background: rgba(0,207,255,0.05); border: 1px solid rgba(0,207,255,0.3); color: #00CFFF; cursor: pointer; transition: 0.3s; font-family: 'IBM Plex Mono'; }
        .tab:hover, .tab.active { background: rgba(0,207,255,0.2); }
        .panel { display: none; }
        .panel.active { display: block; }
        
        .card { background: rgba(11,16,32,0.8); border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; margin-bottom: 1rem; position: relative;}
        .card h3 { margin-bottom: 0.5rem; font-size: 1.2rem; }
        .card p { color: #7D8CA3; margin-bottom: 1rem; }
        
        .btn { padding: 0.5rem 1rem; background: transparent; border: 1px solid rgba(0,207,255,0.4); color: #00CFFF; cursor: pointer; font-family: 'IBM Plex Mono'; }
        .btn:hover { background: rgba(0,207,255,0.1); }
        .btn-danger { border-color: #ff3366; color: #ff3366; }
        .btn-danger:hover { background: rgba(255,51,102,0.1); }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #7D8CA3; font-family: 'IBM Plex Mono'; font-size: 0.85rem;}
        input, textarea { width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; font-family: 'Space Grotesk'; }
        input:focus, textarea:focus { outline: none; border-color: #00CFFF; }
        
        #editor-modal { position: fixed; inset: 0; background: rgba(5,8,22,0.95); padding: 2rem; display: none; overflow-y: auto; z-index: 1000;}
        #editor-modal.active { display: block; }
        .modal-content { max-width: 600px; margin: auto; background: #0B1020; padding: 2rem; border: 1px solid #00CFFF; }
    </style>
</head>
<body>

    <a href="/" class="nav-back">← RETURN TO MAIN SYSTEM</a>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1 style="margin-bottom: 0;">[ SYSTEM ADMIN ]</h1>
        <button id="push-btn" class="btn" style="background: var(--accentSoft); color: var(--bg);" onclick="pushToGit()">Push to GitHub</button>
    </div>
    <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
        <div class="tabs" id="dynamic-tabs" style="margin-bottom: 0;">
            <!-- Tabs injected here -->
        </div>
        <button class="btn" onclick="createNewCategory()" style="border-color: #ffcc00; color: #ffcc00;">+ NEW CATEGORY</button>
    </div>

    <div id="panels-container">
        <!-- Panels injected here -->
    </div>

    <div id="editor-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom: 1.5rem; color: #00CFFF; font-family: 'IBM Plex Mono';">EDIT</h2>
            <form id="editor-form">
                <div id="form-fields"></div>
                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button type="submit" class="btn">SAVE</button>
                    <button type="button" class="btn btn-danger" onclick="closeEditor()">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

<script>
let currentData = {};
let categories = [];
let editingType = null;
let editingId = null;

async function initAdmin() {
    const res = await fetch('/api/categories');
    categories = await res.json();
    
    renderTabsAndPanels();
    
    for (const cat of categories) {
        await fetchData(cat);
    }
    
    if (categories.length > 0) {
        switchTab(categories[0]);
    }
}

function renderTabsAndPanels() {
    const tabsContainer = document.getElementById('dynamic-tabs');
    const panelsContainer = document.getElementById('panels-container');
    
    tabsContainer.innerHTML = categories.map(cat => 
        `<div class="tab" id="tab-${cat}" onclick="switchTab('${cat}')">${cat.toUpperCase().replace(/-/g, ' ')}</div>`
    ).join('');
    
    panelsContainer.innerHTML = categories.map(cat => `
        <div id="${cat}-panel" class="panel">
            <button class="btn" style="margin-bottom: 1rem;" onclick="openEditor('${cat}')">+ NEW ENTRY</button>
            <div id="${cat}-list"></div>
        </div>
    `).join('');
}

async function createNewCategory() {
    const name = prompt("Enter new category name (e.g., 'books', 'podcasts'):");
    if (!name) return;
    
    const res = await fetch('/api/categories', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    });
    
    if (res.ok) {
        initAdmin();
    } else {
        alert("Failed to create category.");
    }
}

async function fetchData(type) {
    const res = await fetch(`/api/${type}`);
    if (res.ok) {
        currentData[type] = await res.json();
        renderList(type);
    }
}

function switchTab(type) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    
    const tab = document.getElementById(`tab-${type}`);
    const panel = document.getElementById(`${type}-panel`);
    
    if (tab) tab.classList.add('active');
    if (panel) panel.classList.add('active');
}

function renderList(type) {
    const container = document.getElementById(`${type}-list`);
    if (!container) return;
    if (!currentData[type]) return;
    
    container.innerHTML = currentData[type].map(item => `
        <div class="card">
            <div style="float: right;">
                <button class="btn" onclick="openEditor('${type}', '${item.id}')">EDIT</button>
                <button class="btn btn-danger" onclick="deleteItem('${type}', '${item.id}')">DEL</button>
            </div>
            <h3>${item.title || item.name || 'Untitled'}</h3>
            <p>${item.description ? item.description.substring(0, 100) + '...' : ''}</p>
        </div>
    `).join('');
}

function openEditor(type, id = null) {
    editingType = type;
    editingId = id;
    
    let item = id ? currentData[type].find(i => i.id === id) : {};
    
    document.getElementById('modal-title').innerText = id ? `EDIT ${type.toUpperCase()}` : `NEW ${type.toUpperCase()}`;
    
    let fieldsHtml = `
        <div class="form-group"><label>Title</label><input type="text" name="title" value="${item.title || ''}" required></div>
        <div class="form-group"><label>Subtitle / Category / Signal</label><input type="text" name="category" value="${item.category || item.signal || ''}"></div>
        <div class="form-group"><label>Tags (comma separated)</label><input type="text" name="tags" value="${item.tags ? item.tags.join(', ') : ''}"></div>
        <div class="form-group"><label>Description / Snippet</label><textarea name="description" rows="5" required>${item.description || ''}</textarea></div>
        <div class="form-group">
            <label>Image URL</label>
            <div style="display:flex; gap:1rem;">
                <input type="text" name="image" id="image-url-input" value="${item.image || ''}">
                <input type="file" id="image-file" style="display:none;" accept="image/*" onchange="uploadImage()">
                <button type="button" class="btn" onclick="document.getElementById('image-file').click()">UPLOAD</button>
            </div>
        </div>
        <div class="form-group"><label>External Link (Store/Read/View URL)</label><input type="text" name="link" value="${item.link || item.viewLink || '#'}"></div>
    `;
    
    document.getElementById('form-fields').innerHTML = fieldsHtml;
    document.getElementById('editor-modal').classList.add('active');
}

function closeEditor() {
    document.getElementById('editor-modal').classList.remove('active');
}

document.getElementById('editor-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    if (data.tags) {
        data.tags = data.tags.split(',').map(t => t.trim()).filter(t => t);
    } else {
        data.tags = [];
    }
    
    const method = editingId ? 'PUT' : 'POST';
    const url = editingId ? `/api/${editingType}/${editingId}` : `/api/${editingType}`;
    
    await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    
    closeEditor();
    fetchData(editingType);
});

async function deleteItem(type, id) {
    if(confirm('Are you sure you want to delete this?')) {
        await fetch(`/api/${type}/${id}`, { method: 'DELETE' });
        fetchData(type);
    }
}

async function uploadImage() {
    const fileInput = document.getElementById('image-file');
    const file = fileInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('image', file);

    try {
        const res = await fetch('/api/upload', {
            method: 'POST',
            body: formData
        });
        if (res.ok) {
            const data = await res.json();
            document.getElementById('image-url-input').value = data.imagePath;
        } else {
            alert('Upload failed');
        }
    } catch (e) {
        console.error('Upload failed', e);
    }
}

async function pushToGit() {
    const btn = document.getElementById('push-btn');
    const originalText = btn.innerText;
    btn.innerText = 'Pushing...';
    try {
        const res = await fetch('/api/push', { method: 'POST' });
        const data = await res.json();
        if(data.success) {
            btn.innerText = 'Pushed Successfully!';
            setTimeout(() => btn.innerText = originalText, 3000);
        } else {
            alert('Push failed: ' + data.message);
            btn.innerText = originalText;
        }
    } catch (e) {
        alert('Push failed: ' + e);
        btn.innerText = originalText;
    }
}

initAdmin();
</script>
</body>
</html>
